version: "3.9"

services:

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build: 
      context: ../frontend
      dockerfile: Dockerfile
    ports: 
      - "4321:4321"
    environment:
      PUBLIC_API_URL: http://backend:8000
      PUBLIC_WS_URL: ws://backend:8000/ws
    depends_on: 
      - backend

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports: 
      - "8000:8000"
    env_file: ../backend/.env
    depends_on:
      postgres: 
        condition: service_healthy
      redis: 
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s

  # ── Celery Workers ────────────────────────────────────────
  worker-speech:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app worker -Q speech -c 2 -n speech@%h
    env_file: ../backend/.env
    depends_on: 
      - redis
      - postgres

  worker-vision:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app worker -Q vision -c 4 -n vision@%h
    env_file: ../backend/.env
    depends_on: 
      - redis
      - postgres

  worker-pipeline:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app worker -Q pipeline,reports,questions -c 2 -n pipeline@%h
    env_file: ../backend/.env
    depends_on: 
      - redis
      - postgres

  celery-beat:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: ../backend/.env
    depends_on: 
      - redis

  # ── AI Services (Python) ──────────────────────────────────
  ai-services:
    build: 
      context: ../ai-services
      dockerfile: Dockerfile
    ports: 
      - "8001:8001"
    env_file: ../ai-services/.env
    volumes: 
      - ai-models:/models
    deploy:
      resources:
        reservations:
          devices: 
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Databases ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interview_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: 
      - "6379:6379"
    volumes: 
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ── Monitoring ────────────────────────────────────────────
  flower:
    image: mher/flower
    command: celery flower --broker=redis://redis:6379/0
    ports: 
      - "5555:5555"
    depends_on: 
      - redis

volumes:
  postgres-data:
  redis-data:
  ai-models:

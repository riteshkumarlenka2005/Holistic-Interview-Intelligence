version: "3.9"

services:

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build: 
      context: ../frontend
      dockerfile: Dockerfile
    ports: 
      - "4321:4321"
    environment:
      PUBLIC_API_URL: http://localhost:8000/v1
      PUBLIC_WS_URL: ws://localhost:8000
    depends_on: 
      - backend

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports: 
      - "8000:8000"
    env_file: ../backend/.env
    volumes:
      - ../backend:/app
    depends_on:
      postgres: 
        condition: service_healthy
      redis: 
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery Worker ────────────────────────────────────────
  celery:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info -c 4
    env_file: ../backend/.env
    volumes:
      - ../backend:/app
    depends_on: 
      postgres: 
        condition: service_healthy
      redis: 
        condition: service_healthy

  celery-beat:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: ../backend/.env
    volumes:
      - ../backend:/app
    depends_on: 
      - redis

  # ── Databases ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interview_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: 
      - "6379:6379"
    volumes: 
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Monitoring ────────────────────────────────────────────
  flower:
    image: mher/flower
    command: celery flower --broker=redis://redis:6379/0
    ports: 
      - "5555:5555"
    depends_on: 
      - redis

volumes:
  postgres-data:
  redis-data:

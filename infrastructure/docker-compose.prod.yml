version: "3.9"

services:

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build: 
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      PUBLIC_API_URL: https://${DOMAIN_NAME:-localhost}
      PUBLIC_WS_URL: wss://${DOMAIN_NAME:-localhost}/ws
    restart: always

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file: ../backend/.env.prod
    depends_on:
      postgres: 
        condition: service_healthy
      redis: 
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
    restart: always

  # ── Celery Workers ────────────────────────────────────────
  worker-speech:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app worker -Q speech -c 2 -n speech@%h
    env_file: ../backend/.env.prod
    depends_on: 
      - redis
      - postgres
    restart: always

  worker-vision:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app worker -Q vision -c 4 -n vision@%h
    env_file: ../backend/.env.prod
    depends_on: 
      - redis
      - postgres
    restart: always

  worker-pipeline:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app worker -Q pipeline,reports,questions -c 2 -n pipeline@%h
    env_file: ../backend/.env.prod
    depends_on: 
      - redis
      - postgres
    restart: always

  celery-beat:
    build: 
      context: ../backend
      dockerfile: Dockerfile.worker
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: ../backend/.env.prod
    depends_on: 
      - redis
    restart: always

  # ── AI Services (Python) ──────────────────────────────────
  ai-services:
    build: 
      context: ../ai-services
      dockerfile: Dockerfile
    env_file: ../ai-services/.env.prod
    volumes: 
      - ai-models:/models
    deploy:
      resources:
        reservations:
          devices: 
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  # ── Databases ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interview_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes: 
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    restart: always

volumes:
  postgres-data:
  redis-data:
  ai-models:

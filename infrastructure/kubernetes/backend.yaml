apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: interview-pro
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: interview-pro
      component: backend
  template:
    metadata:
      labels:
        app: interview-pro
        component: backend
    spec:
      containers:
        - name: backend
          image: interview-pro/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: url
            - name: AI_SERVICE_URL
              value: "http://ai-services-service:8001"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: interview-pro
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

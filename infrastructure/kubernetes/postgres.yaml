apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: holistic-interview
  labels:
    app: holistic-interview
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: holistic-interview
      component: postgres
  template:
    metadata:
      labels:
        app: holistic-interview
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "interview_db"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "password123"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: holistic-interview
spec:
  selector:
    app: holistic-interview
    component: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

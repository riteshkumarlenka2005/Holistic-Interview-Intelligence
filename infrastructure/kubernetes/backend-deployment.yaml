apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: holistic-interview
  labels:
    app: holistic-interview
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: holistic-interview
      component: backend
  template:
    metadata:
      labels:
        app: holistic-interview
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/riteshkumarlenka2005/holistic-interview-intelligence/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

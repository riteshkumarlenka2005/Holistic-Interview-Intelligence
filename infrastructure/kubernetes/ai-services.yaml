apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-services
  labels:
    app: interview-pro
    component: ai-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-pro
      component: ai-services
  template:
    metadata:
      labels:
        app: interview-pro
        component: ai-services
    spec:
      containers:
        - name: ai-services
          image: interview-pro/ai-services:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
              nvidia.com/gpu: 1
            limits:
              memory: "4Gi"
              cpu: "2000m"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-services-service
spec:
  selector:
    app: interview-pro
    component: ai-services
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP

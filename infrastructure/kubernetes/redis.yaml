apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: holistic-interview
  labels:
    app: holistic-interview
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: holistic-interview
      component: redis
  template:
    metadata:
      labels:
        app: holistic-interview
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: holistic-interview
spec:
  selector:
    app: holistic-interview
    component: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP

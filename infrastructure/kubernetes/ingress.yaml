apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: holistic-interview
  annotations:
    kubernetes.io/ingress.class: nginx
    # Support for WebSockets
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # SSL/TLS config
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # CORS (Optional if handled by FastAPI, but good at edge)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://holistic-interview-intelligence.vercel.app"
spec:
  tls:
    - hosts:
        - api.yourdomain.com
      secretName: backend-tls-secret
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

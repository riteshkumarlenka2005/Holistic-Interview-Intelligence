apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: holistic-interview
type: Opaque
stringData:
  # Base64 encoded values are typically required for standard 'data' fields,
  # but 'stringData' allows plain text which Kubernetes will base64 encode automatically.
  # IMPORTANT: Replace these dummy values before applying in production!
  DATABASE_URL: "postgresql+asyncpg://postgres:password123@postgres-service:5432/interview_db"
  SECRET_KEY: "change_this_to_a_secure_random_string_in_production"
  GEMINI_API_KEY: "your_gemini_api_key_here"
  GITHUB_CLIENT_ID: "your_github_client_id"
  GITHUB_CLIENT_SECRET: "your_github_client_secret"
  GOOGLE_CLIENT_ID: "your_google_client_id"
  GOOGLE_CLIENT_SECRET: "your_google_client_secret"

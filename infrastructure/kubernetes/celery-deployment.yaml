apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: holistic-interview
  labels:
    app: holistic-interview
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: holistic-interview
      component: celery-worker
  template:
    metadata:
      labels:
        app: holistic-interview
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/riteshkumarlenka2005/holistic-interview-intelligence/backend:latest
          imagePullPolicy: Always
          command: ["celery"]
          args: ["-A", "app.core.celery_app", "worker", "--loglevel=info", "--pool=threads", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - celery -A app.core.celery_app inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10

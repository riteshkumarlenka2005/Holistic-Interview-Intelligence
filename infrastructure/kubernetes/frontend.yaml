apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: interview-pro
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-pro
      component: frontend
  template:
    metadata:
      labels:
        app: interview-pro
        component: frontend
    spec:
      containers:
        - name: frontend
          image: interview-pro/frontend:latest
          ports:
            - containerPort: 4321
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_URL
              value: "http://backend-service:8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: interview-pro
    component: frontend
  ports:
    - port: 80
      targetPort: 4321
  type: ClusterIP
